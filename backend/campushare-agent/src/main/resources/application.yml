spring:
  application:
    name: campushare-agent

  # 主数据源：MySQL（业务表：会话/轮次/记忆/知识文章等）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campushare?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: campushare
    password: campushare123
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

  # 虚拟线程：WebFlux 阻塞操作（DB/Feign）调度到虚拟线程，避免占用 Reactor 线程
  threads:
    virtual:
      enabled: true

# Feign 调用目标服务
service:
  user:
    url: http://localhost:8081
  post:
    url: http://localhost:8082

server:
  port: 8083

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.campushare.agent.entity
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# 应用自定义配置（统一前缀 app）
app:
  # 向量库数据源：PostgreSQL + pgvector
  # 用自定义前缀，不触发 Spring Boot 自动配置，由 PgVectorConfig 配置类手动创建 DataSource
  datasource:
    pgvector:
      driver-class-name: org.postgresql.Driver
      url: jdbc:postgresql://localhost:5432/agent_vectors
      username: agent
      password: ${AGENT_PG_PASSWORD:agent123456}
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2

  # LLM 客户端配置
  # base-url 支持代理通道（如 New API），通过环境变量 DEEPSEEK_BASE_URL 配置
  llm:
    deepseek:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:sk-placeholder}
      model: deepseek-v4-flash
      timeout: 60000
      temperature: 0.7
      max-tokens: 2048
      retry:
        max-attempts: 3
        backoff: 1000
      circuit-breaker:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50.0
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      connection-pool:
        max-connections: 50
        pending-acquire-timeout: 45000
    embedding:
      base-url: ${EMBEDDING_BASE_URL:https://api.siliconflow.cn}
      api-key: ${EMBEDDING_API_KEY:sk-placeholder}
      model: BAAI/bge-m3
      timeout: 30000
      batch-size: 32
      max-tokens: 8000
      retry:
        max-attempts: 3
        backoff: 1000
      circuit-breaker:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50.0
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      connection-pool:
        max-connections: 30
        pending-acquire-timeout: 30000

  # 检索参数
  retrieval:
    top-k: 10
    rerank-top-k: 5
    rrf-k: 60
    # 意图驱动检索配置（ADR-024）
    # enabled: 是否启用意图驱动检索（false 时所有意图走默认均等配置）
    # low-confidence-boost: 低置信度（<0.6）时各路 topK 扩大值
    # default-token-budget: 检索结果 token 预算上限（P1 阶段生效）
    intent-driven:
      enabled: true
      low-confidence-boost: 3
      default-token-budget: 2500
    # 检索结果 Redis 缓存（ADR-029）
    # enabled: 是否启用缓存（false 时每次都走完整检索）
    # ttl: 缓存存活时间（5 分钟，平衡一致性和性能）
    # 注意：CLARIFY 意图不缓存（依赖上一轮上下文，结果因会话而异）
    cache:
      enabled: true
      ttl: 5m

  # 知识库管理配置
  # docs-path: 文档目录（随仓库提交的 Markdown 文档）
  # chunk: 分块参数（遵循 project_memory 硬约束：H2→H3→段落→句子，目标 256/最大 512/重叠 50）
  # quality: 四维质量评分权重（召回 0.4 + 反馈 0.3 + 新鲜度 0.2 + 完整度 0.1，总和=1.0）
  # duplicate: 双阈值重复检测（≥0.95 DUPLICATE / ≥0.85 SIMILAR / else UNIQUE）
  knowledge:
    docs-path: docs/agent-assistant/knowledge-docs
    chunk:
      target-tokens: 256
      max-tokens: 512
      overlap-tokens: 50
    quality:
      weight-recall: 0.4
      weight-feedback: 0.3
      weight-freshness: 0.2
      weight-completeness: 0.1
    duplicate:
      threshold-exact: 0.95
      threshold-similar: 0.85

  # 帖子向量同步熔断配置
  post-sync:
    circuit-breaker:
      sliding-window-size: 10
      minimum-number-of-calls: 5
      failure-rate-threshold: 50.0
      wait-duration-in-open-state: 30s
      permitted-number-of-calls-in-half-open-state: 3

  # 意图识别配置
  intent:
    classifier:
      timeout: 3s
      confidence-threshold: 0.6
      circuit-breaker:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50.0
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
    cache:
      ttl: 1h

  # 内部 API 调用 token（服务间鉴权，绕过网关）
  internal:
    token: ${INTERNAL_API_TOKEN:campushare-internal-token}

  # System Prompt 版本管理配置（ADR-SP-07）
  # current: 启动时写入 Redis 的初始版本号
  # gray-ratio: 灰度比例（0-100），100=全量
  # fallback-on-db-error: DB/Redis 故障时是否降级到 PromptConstants 硬编码常量
  prompt:
    version:
      current: v1.0.0
      gray-ratio: 100
      fallback-on-db-error: true

  eval:
    llm-judge-enabled: true

  slo:
    enabled: true
    objectives:
      chat:
        name: Chat Service
        description: Agent chat response SLO
        availability: 99.9
        latency-p50-ms: 800
        latency-p95-ms: 3000
        latency-p99-ms: 8000
        error-rate: 0.01
        burn-rate-threshold: 5
        window-minutes: 5
      intent-recognition:
        name: Intent Recognition
        description: Intent classification SLO
        availability: 99.95
        latency-p50-ms: 200
        latency-p95-ms: 500
        latency-p99-ms: 1000
        error-rate: 0.005
        burn-rate-threshold: 5
        window-minutes: 5
      retrieval:
        name: RAG Retrieval
        description: Knowledge retrieval SLO
        availability: 99.9
        latency-p50-ms: 300
        latency-p95-ms: 1000
        latency-p99-ms: 2000
        error-rate: 0.01
        burn-rate-threshold: 5
        window-minutes: 5

logging:
  level:
    root: INFO
    '[com.campushare]': DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId:-}] %-5level %logger{36} - %msg%n'

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        '[http.server.requests]': true
      percentiles:
        '[http.server.requests]':
          - 0.5
          - 0.75
          - 0.9
          - 0.95
          - 0.99
