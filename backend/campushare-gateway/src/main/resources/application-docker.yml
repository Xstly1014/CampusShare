spring:
  cloud:
    gateway:
      httpclient:
        pool:
          max-connections: 50
          max-idle-time: 30s
      routes:
        - id: post-service
          uri: http://post-service:8082
          predicates:
            - Path=/api/posts/**,/api/comments/**,/api/categories/**,/api/admin/**
          filters:
            - StripPrefix=1

        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=1

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

jwt:
  secret: CampusShare-Secret-Key-For-Docker-Deployment-2024-Minimum-256-Bits-Required

server:
  port: 8080
  max-http-header-size: 64KB
  netty:
    max-initial-line-length: 4096
    max-header-size: 4096
    max-content-length: 104857600

reactor:
  netty:
    ioWorkerCount: 1

logging:
  level:
    root: WARN
    com.campushare: INFO
    org.springframework.cloud.gateway: WARN
    reactor.netty: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,loggers,gateway
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      minimum-expected-value:
        http.server.requests: 1ms
      maximum-expected-value:
        http.server.requests: 10s
    web:
      server:
        request:
          autotime:
            enabled: true
            percentiles: 0.5,0.75,0.9,0.95,0.99
    gateway:
      request-metrics:
        enabled: true
