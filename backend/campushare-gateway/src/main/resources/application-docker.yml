spring:
  cloud:
    gateway:
      routes:
        - id: post-service
          uri: http://post-service:8082
          predicates:
            - Path=/api/posts/**,/api/comments/**,/api/categories/**,/api/admin/**
          filters:
            - StripPrefix=1

        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=1

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

jwt:
  secret: CampusShare-Secret-Key-For-Docker-Deployment-2024-Minimum-256-Bits-Required

server:
  port: 8080
  max-http-header-size: 64KB
  netty:
    max-initial-line-length: 4096
    max-header-size: 4096
    max-content-length: 104857600

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,loggers,gateway
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
    gateway:
      request-metrics:
        enabled: true
