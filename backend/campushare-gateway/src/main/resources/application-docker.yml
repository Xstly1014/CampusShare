spring:
  codec:
    max-in-memory-size: 100MB
  cloud:
    gateway:
      routes:
        - id: post-service
          uri: http://post-service:8082
          predicates:
            - Path=/api/posts/**,/api/comments/**,/api/categories/**,/api/admin/**
          filters:
            - StripPrefix=1

        - id: agent-service
          uri: http://agent-service:8083
          predicates:
            - Path=/api/agent/**
          filters:
            - StripPrefix=1

        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=1

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      metrics:
        enabled: true

jwt:
  secret: CampusShare-Secret-Key-For-Docker-Deployment-2024-Minimum-256-Bits-Required

server:
  port: 8080
  max-http-request-header-size: 64KB
  netty:
    connection-timeout: 30000
    idle-timeout: 60000

logging:
  level:
    root: WARN
    '[com.campushare]': INFO
    '[org.springframework.cloud.gateway]': WARN
    '[reactor.netty]': WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,loggers,gateway
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        '[http.server.requests]': true
      minimum-expected-value:
        '[http.server.requests]': 1ms
      maximum-expected-value:
        '[http.server.requests]': 10s
      percentiles:
        '[http.server.requests]':
          - 0.5
          - 0.75
          - 0.9
          - 0.95
          - 0.99
