# API网关配置
spring:
  application:
    name: campushare-gateway

  codec:
    max-in-memory-size: 100MB

  cloud:
    gateway:
      # 路由规则
      routes:
        # 帖子服务（优先匹配）
        - id: post-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/posts/**,/api/comments/**,/api/categories/**,/api/admin/**
          filters:
            - StripPrefix=1

        # 用户服务（兜底匹配）
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=1

      # 全局跨域配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      # 默认过滤器
      default-filters:
        - DedupeResponseHeader=Vary Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

      # 网关指标
      metrics:
        enabled: true

  # Redis配置（用于限流）
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms

# JWT配置
jwt:
  secret: CampusShare-Secret-Key-For-Local-Development-2024-Minimum-256-Bits-Required

# 服务端口
server:
  port: 8080
  max-http-request-header-size: 64KB
  netty:
    connection-timeout: 30000
    idle-timeout: 60000

# 日志配置
logging:
  level:
    root: INFO
    '[com.campushare]': DEBUG
    '[org.springframework.cloud.gateway]': DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'

# Actuator 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,loggers,gateway
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        '[http.server.requests]': true
      minimum-expected-value:
        '[http.server.requests]': 1ms
      maximum-expected-value:
        '[http.server.requests]': 10s
      percentiles:
        '[http.server.requests]':
          - 0.5
          - 0.75
          - 0.9
          - 0.95
          - 0.99
