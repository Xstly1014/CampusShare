spring:
  datasource:
    url: jdbc:mysql://mysql:3306/campushare?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 8
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: redis
      port: 6379
      password: ""
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 2
          min-idle: 1

feign:
  httpclient:
    enabled: true
    max-connections: 50
    max-connections-per-route: 20

service:
  user:
    url: http://user-service:8081

server:
  port: 8082
  tomcat:
    threads:
      max: 32
      min-spare: 4
    accept-count: 50
    max-connections: 200

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    root: WARN
    com.campushare: INFO
    org.springframework: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      minimum-expected-value:
        http.server.requests: 1ms
      maximum-expected-value:
        http.server.requests: 10s
    web:
      server:
        request:
          autotime:
            enabled: true
            percentiles: 0.5,0.75,0.9,0.95,0.99
  health:
    redis:
      enabled: true
