spring:
  datasource:
    url: jdbc:mysql://mysql:3306/campushare?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 8
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: redis
      port: 6379
      password: ""
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 2
          min-idle: 1

  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:campusshare@qq.com}
    password: ${MAIL_PASSWORD:your-smtp-authorization-code}
    default-encoding: UTF-8
    properties:
      mail:
        debug: false
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 30000
          timeout: 30000
          writetimeout: 30000

feign:
  httpclient:
    enabled: true
    max-connections: 50
    max-connections-per-route: 20

service:
  post:
    url: http://post-service:8082

jwt:
  secret: CampusShare-Secret-Key-For-Docker-Deployment-2024-Minimum-256-Bits-Required
  expiration: 86400000

mail:
  from-name: CampusShare 校园共享

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: 8081
  tomcat:
    threads:
      max: 32
      min-spare: 4
    accept-count: 50
    max-connections: 200

file:
  upload-path: /app/uploads/
  access-url: /files/

logging:
  level:
    root: WARN
    com.campushare: INFO
    org.springframework: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      minimum-expected-value:
        http.server.requests: 1ms
      maximum-expected-value:
        http.server.requests: 10s
    web:
      server:
        request:
          autotime:
            enabled: true
            percentiles: 0.5,0.75,0.9,0.95,0.99
  health:
    mail:
      enabled: false
    redis:
      enabled: true
