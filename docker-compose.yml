# ========================================
# CampusShare - Full Stack Docker Compose
# ========================================
# 一键部署所有服务：基础设施 + 后端 + 前端
# 使用方式：docker-compose up -d --build

services:
  # ========================================
  # 基础设施服务
  # ========================================

  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: campushare-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: campushare
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password --skip-mysqlx
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - campushare-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: campushare-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - campushare-network

  # ========================================
  # 后端应用服务
  # ========================================

  # 用户服务
  user-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: user-service
    image: campusshare/user-service:latest
    container_name: campushare-user-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - TZ=Asia/Shanghai
      - JAVA_OPTS=-Xms256m -Xmx512m -javaagent:/app/opentelemetry-javaagent.jar
      - OTEL_SERVICE_NAME=campushare-user
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_LOGS_EXPORTER=none
      - OTEL_METRICS_EXPORTER=none
      - OTEL_TRACES_SAMPLER=parentbased_always_on
      # 邮件 SMTP 配置（在 .env 文件中设置真实值）
      - MAIL_HOST=${MAIL_HOST:-smtp.qq.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-campusshare@qq.com}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-your-smtp-authorization-code}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - campushare-network

  # API网关服务
  gateway-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: gateway-service
    image: campusshare/gateway-service:latest
    container_name: campushare-gateway-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - TZ=Asia/Shanghai
      - JAVA_OPTS=-Xms128m -Xmx256m -javaagent:/app/opentelemetry-javaagent.jar
      - OTEL_SERVICE_NAME=campushare-gateway
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_LOGS_EXPORTER=none
      - OTEL_METRICS_EXPORTER=none
      - OTEL_TRACES_SAMPLER=parentbased_always_on
    depends_on:
      user-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - campushare-network

  # ========================================
  # 监控与可观测性服务
  # ========================================

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: campushare-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./backend/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./backend/docker/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - campushare-network

  # Grafana 可视化
  grafana:
    image: grafana/grafana:10.4.0
    container_name: campushare-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./backend/docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./backend/docker/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - campushare-network

  # Tempo 分布式链路追踪
  tempo:
    image: grafana/tempo:2.5.0
    container_name: campushare-tempo
    restart: unless-stopped
    ports:
      - "3200:3200"    # Tempo HTTP 查询
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    command: [ "-config.file=/etc/tempo.yml" ]
    volumes:
      - ./backend/docker/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/tmp/tempo
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3200/status/ready" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - campushare-network

  # ========================================
  # 前端应用服务
  # ========================================

  # 前端Web应用
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    image: campusshare/frontend:latest
    container_name: campushare-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      gateway-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - campushare-network

# ========================================
# 数据卷
# ========================================
volumes:
  mysql_data:
    driver: local
    name: campushare-mysql-data
  redis_data:
    driver: local
    name: campushare-redis-data
  uploads_data:
    driver: local
    name: campushare-uploads-data
  prometheus_data:
    driver: local
    name: campushare-prometheus-data
  grafana_data:
    driver: local
    name: campushare-grafana-data
  tempo_data:
    driver: local
    name: campushare-tempo-data

# ========================================
# 网络
# ========================================
networks:
  campushare-network:
    driver: bridge
    name: campushare-network
